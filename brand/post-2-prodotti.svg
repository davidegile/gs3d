<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#161610"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff8c5a"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>
  <ellipse cx="540" cy="540" rx="480" ry="400" fill="#FF6B35" opacity="0.05"/>

  <!-- Label -->
  <rect x="340" y="72" width="400" height="48" rx="24" fill="#FF6B35" opacity="0.15"/>
  <rect x="340" y="72" width="400" height="48" rx="24" fill="none" stroke="#FF6B35" stroke-width="1.5" opacity="0.5"/>
  <text x="540" y="103" font-family="Arial,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#ff8c5a" letter-spacing="3">I NOSTRI PRODOTTI</text>

  <!-- Headline -->
  <text x="540" y="196" font-family="Arial Black,sans-serif" font-size="46" font-weight="900" text-anchor="middle" fill="#f0f0f0">Rendi la tua attività</text>
  <text x="540" y="252" font-family="Arial Black,sans-serif" font-size="46" font-weight="900" text-anchor="middle" fill="url(#orange)">impossibile da dimenticare</text>

  <!-- Product cards 2x2 -->
  <!-- Card 1 -->
  <rect x="80" y="290" width="440" height="200" rx="20" fill="#111111" stroke="#FF6B35" stroke-width="2" stroke-opacity="0.4"/>
  <text x="300" y="360" font-family="Arial,sans-serif" font-size="52" text-anchor="middle">🔑</text>
  <text x="300" y="418" font-family="Arial Black,sans-serif" font-size="26" font-weight="700" text-anchor="middle" fill="#f0f0f0">Portachiavi 3D</text>
  <text x="300" y="454" font-family="Arial,sans-serif" font-size="20" text-anchor="middle" fill="#ff8c5a">da €2,50 cad.</text>

  <!-- Card 2 -->
  <rect x="560" y="290" width="440" height="200" rx="20" fill="#111111" stroke="#FF6B35" stroke-width="2" stroke-opacity="0.4"/>
  <text x="780" y="360" font-family="Arial,sans-serif" font-size="52" text-anchor="middle">💡</text>
  <text x="780" y="418" font-family="Arial Black,sans-serif" font-size="26" font-weight="700" text-anchor="middle" fill="#f0f0f0">Insegne LED</text>
  <text x="780" y="454" font-family="Arial,sans-serif" font-size="20" text-anchor="middle" fill="#ff8c5a">da €120</text>

  <!-- Card 3 -->
  <rect x="80" y="520" width="440" height="200" rx="20" fill="#111111" stroke="#FF6B35" stroke-width="2" stroke-opacity="0.4"/>
  <text x="300" y="590" font-family="Arial,sans-serif" font-size="52" text-anchor="middle">🏷️</text>
  <text x="300" y="648" font-family="Arial Black,sans-serif" font-size="26" font-weight="700" text-anchor="middle" fill="#f0f0f0">Gadget su misura</text>
  <text x="300" y="684" font-family="Arial,sans-serif" font-size="20" text-anchor="middle" fill="#ff8c5a">da €5 cad.</text>

  <!-- Card 4 -->
  <rect x="560" y="520" width="440" height="200" rx="20" fill="#111111" stroke="#FF6B35" stroke-width="2" stroke-opacity="0.4"/>
  <text x="780" y="590" font-family="Arial,sans-serif" font-size="52" text-anchor="middle">🖨️</text>
  <text x="780" y="648" font-family="Arial Black,sans-serif" font-size="26" font-weight="700" text-anchor="middle" fill="#f0f0f0">Prototipazione</text>
  <text x="780" y="684" font-family="Arial,sans-serif" font-size="20" text-anchor="middle" fill="#ff8c5a">su richiesta</text>

  <!-- Trust -->
  <text x="540" y="790" font-family="Arial,sans-serif" font-size="22" text-anchor="middle" fill="#888899">✓ Produzione italiana   ✓ Consegna 7-10gg   ✓ Nessun minimo</text>

  <!-- CTA -->
  <rect x="190" y="828" width="700" height="76" rx="38" fill="#FF6B35"/>
  <text x="540" y="875" font-family="Arial Black,sans-serif" font-size="26" font-weight="900" text-anchor="middle" fill="#ffffff">Preventivo gratuito → Link in bio</text>

  <!-- For who -->
  <text x="540" y="966" font-family="Arial,sans-serif" font-size="22" text-anchor="middle" fill="#888899">Per B&amp;B · Hotel · Lidi · Ristoranti · Negozi</text>

  <!-- Footer con cubo isometrico + wordmark -->
  <rect x="0" y="990" width="1080" height="90" fill="#080808"/>
  <line x1="0" y1="990" x2="1080" y2="990" stroke="#FF6B35" stroke-width="1" opacity="0.25"/>
  <polygon points="388,1004 404,1012 388,1020 372,1012" fill="#FFD700" opacity="0.95"/>
  <polygon points="372,1012 372,1032 388,1040 388,1020" fill="#FF6B35" opacity="0.90"/>
  <polygon points="404,1012 404,1032 388,1040 388,1020" fill="#e55520" opacity="0.80"/>
  <text x="418" y="1035" font-family="Arial,sans-serif" font-size="26" font-weight="800" fill="#f0f0f0" letter-spacing="-0.5">GS<tspan fill="#FF6B35">3D</tspan></text>
  <text x="496" y="1035" font-family="Arial,sans-serif" font-size="17" fill="#FF6B35" opacity="0.8">· gs3d-lab.com</text>
