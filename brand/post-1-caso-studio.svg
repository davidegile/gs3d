<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#161610"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff8c5a"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>
  <ellipse cx="540" cy="400" rx="500" ry="350" fill="#FF6B35" opacity="0.06"/>

  <!-- Label -->
  <rect x="290" y="72" width="500" height="48" rx="24" fill="#FF6B35" opacity="0.15"/>
  <rect x="290" y="72" width="500" height="48" rx="24" fill="none" stroke="#FF6B35" stroke-width="1.5" opacity="0.5"/>
  <text x="540" y="103" font-family="Arial,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#ff8c5a" letter-spacing="3">CASO STUDIO — LIDO DIOMEDEE</text>

  <!-- Headline -->
  <text x="540" y="196" font-family="Arial Black,sans-serif" font-size="44" font-weight="900" text-anchor="middle" fill="#f0f0f0">I portachiavi che fanno</text>
  <text x="540" y="250" font-family="Arial Black,sans-serif" font-size="44" font-weight="900" text-anchor="middle" fill="url(#orange)">pubblicità ogni giorno</text>

  <!-- Stats -->
  <rect x="80" y="290" width="420" height="180" rx="20" fill="#111111" stroke="#FF6B35" stroke-width="1.5" stroke-opacity="0.3"/>
  <text x="290" y="378" font-family="Arial Black,sans-serif" font-size="72" font-weight="900" text-anchor="middle" fill="url(#orange)">500+</text>
  <text x="290" y="424" font-family="Arial,sans-serif" font-size="20" text-anchor="middle" fill="#888899">portachiavi consegnati</text>
  <text x="290" y="452" font-family="Arial,sans-serif" font-size="20" text-anchor="middle" fill="#888899">al Lido Diomedee</text>

  <rect x="580" y="290" width="420" height="180" rx="20" fill="#111111" stroke="#FF6B35" stroke-width="1.5" stroke-opacity="0.3"/>
  <text x="790" y="360" font-family="Arial Black,sans-serif" font-size="52" font-weight="900" text-anchor="middle" fill="url(#orange)">15/giorno</text>
  <text x="790" y="410" font-family="Arial,sans-serif" font-size="20" text-anchor="middle" fill="#888899">preventivi ricevuti</text>
  <text x="790" y="438" font-family="Arial,sans-serif" font-size="20" text-anchor="middle" fill="#888899">grazie al pacchetto completo</text>

  <!-- What -->
  <text x="540" y="540" font-family="Arial,sans-serif" font-size="20" font-weight="700" text-anchor="middle" fill="#888899" letter-spacing="2">COSA ABBIAMO REALIZZATO</text>
  <line x1="160" y1="560" x2="920" y2="560" stroke="#FF6B35" stroke-width="1" opacity="0.2"/>

  <text x="540" y="618" font-family="Arial,sans-serif" font-size="28" text-anchor="middle" fill="#f0f0f0">🔑 Portachiavi 3D brandizzati per gli ospiti</text>
  <text x="540" y="672" font-family="Arial,sans-serif" font-size="28" text-anchor="middle" fill="#f0f0f0">💡 Insegna LED con logo personalizzato</text>
  <text x="540" y="726" font-family="Arial,sans-serif" font-size="28" text-anchor="middle" fill="#f0f0f0">🌐 Sito web + Google Ads</text>

  <!-- Quote -->
  <rect x="100" y="780" width="880" height="130" rx="16" fill="#FF6B35" opacity="0.07"/>
  <rect x="100" y="780" width="880" height="130" rx="16" fill="none" stroke="#FF6B35" stroke-width="1" opacity="0.3"/>
  <text x="540" y="828" font-family="Arial,sans-serif" font-size="22" font-style="italic" text-anchor="middle" fill="#e0e0d8">"I portachiavi li portano a casa tutti gli ospiti.</text>
  <text x="540" y="862" font-family="Arial,sans-serif" font-size="22" font-style="italic" text-anchor="middle" fill="#e0e0d8">È come avere la nostra pubblicità in giro per tutta Italia."</text>
  <text x="540" y="896" font-family="Arial,sans-serif" font-size="16" text-anchor="middle" fill="#ff8c5a">— Titolare, Lido Diomedee</text>

  <!-- Footer con cubo isometrico + wordmark -->
  <rect x="0" y="990" width="1080" height="90" fill="#080808"/>
  <line x1="0" y1="990" x2="1080" y2="990" stroke="#FF6B35" stroke-width="1" opacity="0.25"/>
  <!-- Cubo isometrico (piccolo) -->
  <polygon points="388,1004 404,1012 388,1020 372,1012" fill="#FFD700" opacity="0.95"/>
  <polygon points="372,1012 372,1032 388,1040 388,1020" fill="#FF6B35" opacity="0.90"/>
  <polygon points="404,1012 404,1032 388,1040 388,1020" fill="#e55520" opacity="0.80"/>
  <!-- Wordmark -->
  <text x="418" y="1035" font-family="Arial,sans-serif" font-size="26" font-weight="800" fill="#f0f0f0" letter-spacing="-0.5">GS<tspan fill="#FF6B35">3D</tspan></text>
  <text x="496" y="1035" font-family="Arial,sans-serif" font-size="17" fill="#FF6B35" opacity="0.8">· gs3d-lab.com</text>
</svg>
