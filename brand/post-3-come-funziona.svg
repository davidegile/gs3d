  <rect x="240" y="930" width="600" height="70" rx="35" fill="#FF6B35"/>
  <text x="540" y="975" font-family="Arial Black,sans-serif" font-size="24" font-weight="900" text-anchor="middle" fill="#ffffff">Richiedi preventivo → Link in bio</text>

  <!-- Footer -->
  <text x="540" y="1050" font-family="Arial Black,sans-serif" font-size="22" font-weight="900" text-anchor="middle" fill="url(#orange)" letter-spacing="2">GS3D · gs3d-lab.com</text>
