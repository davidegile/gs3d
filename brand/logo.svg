<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 120">
  <defs>
    <linearGradient id="cubegrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff8c5a"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
    <linearGradient id="wordgrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f0f0f0"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
  </defs>

  <rect width="360" height="120" fill="#0a0a0a"/>

  <!-- Isometric cube — orange/gold palette -->
  <!-- Top face: brightest -->
  <polygon points="60,20 88,34 60,48 32,34" fill="#FFD700" opacity="0.95"/>
  <!-- Left face: brand orange -->
  <polygon points="32,34 60,48 60,82 32,68" fill="#FF6B35" opacity="0.90"/>
  <!-- Right face: dark orange -->
  <polygon points="88,34 88,68 60,82 60,48" fill="#e55520" opacity="0.80"/>

  <!-- Wordmark -->
  <text x="108" y="62" font-family="Arial,sans-serif" font-size="44" font-weight="800" fill="url(#wordgrad)" letter-spacing="-1">GS<tspan fill="#FF6B35">3D</tspan></text>

  <!-- Tagline -->
  <text x="108" y="90" font-family="Arial,sans-serif" font-size="11" font-weight="500" fill="#FF6B35" letter-spacing="4">STAMPA 3D · LED · GADGET</text>
</svg>
