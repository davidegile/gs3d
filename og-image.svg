<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#161610"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="textgrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff8c5a"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow -->
  <ellipse cx="600" cy="200" rx="500" ry="300" fill="url(#glow)" opacity="0.5"/>

  <!-- Border -->
  <rect x="2" y="2" width="1196" height="626" rx="12" fill="none" stroke="#FF6B35" stroke-width="2" opacity="0.3"/>

  <!-- Logo -->
  <text x="600" y="210" font-family="Arial Black, sans-serif" font-size="110" font-weight="900" text-anchor="middle" fill="#ffffff" letter-spacing="4">GS<tspan fill="url(#textgrad)">3D</tspan></text>

  <!-- Tagline -->
  <text x="600" y="300" font-family="Arial, sans-serif" font-size="30" font-weight="400" text-anchor="middle" fill="#888899">Stampa 3D · Insegne LED · Gadget Personalizzati</text>

  <!-- Divider -->
  <line x1="400" y1="340" x2="800" y2="340" stroke="#FF6B35" stroke-width="1" opacity="0.4"/>

  <!-- CTA -->
  <text x="600" y="400" font-family="Arial, sans-serif" font-size="28" font-weight="600" text-anchor="middle" fill="#f0f0f0">Portachiavi, insegne LED e gadget su misura.</text>
  <text x="600" y="445" font-family="Arial, sans-serif" font-size="24" font-weight="400" text-anchor="middle" fill="#888899">Produzione artigianale italiana · Preventivo gratuito</text>

  <!-- Badge -->
  <rect x="460" y="490" width="280" height="48" rx="24" fill="#FF6B35" opacity="0.12"/>
  <rect x="460" y="490" width="280" height="48" rx="24" fill="none" stroke="#FF6B35" stroke-width="1.5" opacity="0.4"/>
  <text x="600" y="521" font-family="Arial, sans-serif" font-size="20" font-weight="700" text-anchor="middle" fill="#ff8c5a">gs3d-lab.com</text>
</svg>
