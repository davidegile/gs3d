<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#0a0a0a"/>
  <!-- Isometric cube — orange/gold palette, same as logo -->
  <!-- Top face: gold -->
  <polygon points="32,8  50,18  32,28  14,18" fill="#FFD700" opacity="0.97"/>
  <!-- Left face: orange -->
  <polygon points="14,18 14,42  32,52  32,28" fill="#FF6B35" opacity="0.92"/>
  <!-- Right face: dark orange -->
  <polygon points="50,18 50,42  32,52  32,28" fill="#e55520" opacity="0.82"/>
</svg>
